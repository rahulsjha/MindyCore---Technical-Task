version: '3.8'

# Docker Compose optimized for Render PostgreSQL
# Usage: docker-compose -f docker-compose-render.yml up --build

services:
  api:
    build: .
    container_name: mindy-task-api
    environment:
      # Uses Render PostgreSQL from .env
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Restart policy for production
    restart: unless-stopped
